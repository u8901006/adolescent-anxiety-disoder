<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>青少年焦慮症文獻日報 · Adolescent Anxiety Disorders</title>
<style>
  :root { --bg: #f6f1e8; --surface: #fffaf2; --line: #d8c5ab; --text: #2b2118; --muted: #766453; --accent: #8c4f2b; --accent-soft: #ead2bf; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: radial-gradient(circle at top, #fff6ea 0, var(--bg) 55%, #ead8c6 100%); color: var(--text); font-family: "Noto Sans TC", "PingFang TC", "Helvetica Neue", Arial, sans-serif; min-height: 100vh; }
  .container { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 80px 24px; }
  .logo { font-size: 48px; text-align: center; margin-bottom: 16px; }
  h1 { text-align: center; font-size: 24px; color: var(--text); margin-bottom: 4px; }
  .subtitle-en { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: var(--accent); font-size: 14px; margin-bottom: 48px; }
  .coming-soon { text-align: center; color: var(--muted); font-size: 15px; margin-top: 32px; padding: 40px 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; }
  footer { margin-top: 56px; text-align: center; font-size: 12px; color: var(--muted); }
  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="container">
  <div class="logo">🧒</div>
  <h1>青少年焦慮症文獻日報</h1>
  <p class="subtitle-en">Adolescent Anxiety Disorders Daily Literature Report</p>
  <p class="subtitle">每日自動更新 · Powered by PubMed + Zhipu AI</p>
  <div class="coming-soon">📅 第一期日報即將發布，敬請期待...</div>
  <footer>
    <p>Powered by PubMed + Zhipu AI · <a href="https://github.com/u8901006/adolescent-anxiety-disoder">GitHub</a></p>
  </footer>
</div>
</body>
</html>
